name: ping

on:
  schedule:
    # Every 5 min, offset off the congested round minutes (:00/:15/:30/:45)
    # where GitHub's scheduled-cron queue is slowest.
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ping
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Check schedule and ping
        run: node scripts/check-and-ping.mjs
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Commit state
        run: |
          if ! git diff --quiet state.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "state: record ping"
            git pull --rebase
            git push
          fi
